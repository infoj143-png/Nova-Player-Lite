name: Android Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      working-directory: NovaPlayerLite

    - name: Build with Gradle
      run: ./gradlew assembleDebug
      working-directory: NovaPlayerLite

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NovaPlayerLite-Debug-APK
        path: NovaPlayerLite/app/build/outputs/apk/debug/app-debug.apk
